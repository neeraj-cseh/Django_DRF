<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Futuristic UI</title>

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND ANIMATION */
body {
    height: 100vh;
    background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
    background-size: 600% 600%;
    animation: gradientMove 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* MAIN CONTAINER */
.container {
    width: 90%;
    max-width: 1000px;
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
    text-align: center;
}

/* TITLE */
h1 {
    font-size: 2.5rem;
    color: #00f7ff;
    text-shadow: 0 0 20px #00f7ff;
    margin-bottom: 10px;
}

p {
    color: #ccc;
    margin-bottom: 30px;
}

/* BUTTON */
.btn {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #00f7ff, #00ff88);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 15px #00f7ff;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 30px #00ffea;
}

/* CARD GRID */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.card {
    padding: 20px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 20px #00f7ff;
}

.card h3 {
    color: #00f7ff;
    margin-bottom: 10px;
}

.card p {
    font-size: 0.9rem;
    color: #bbb;
}

/* FOOTER */
.footer {
    margin-top: 30px;
    font-size: 0.8rem;
    color: #888;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 Future UI</h1>
    <p>Welcome to your futuristic interface</p>

    <button class="btn" onclick="showMessage()">Click Me</button>

    <div class="cards">
        <div class="card">
            <h3>⚡ Speed</h3>
            <p>Blazing fast performance with modern design</p>
        </div>
        <div class="card">
            <h3>🎨 Design</h3>
            <p>Glassmorphism + neon futuristic theme</p>
        </div>
        <div class="card">
            <h3>🔒 Security</h3>
            <p>Built with best practices in mind</p>
        </div>
    </div>

    <div class="footer">
        Built with ❤️ using HTML, CSS & JS
    </div>
</div>

<script>
function showMessage() {
    alert("🔥 Welcome {{sname | truncatechars:3}} to the Future UI!");
}
</script>

</body>
</html>
```
